name: rebirth-closed-beta-qa

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read
  actions: read

jobs:
  closed-beta-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pip-audit
          python -m playwright install --with-deps chromium

      - name: Security dependency audit
        run: |
          pip-audit -r requirements.txt
          pip-audit -r requirements-dev.txt

      - name: Rebirth fast suite
        run: pytest tests/rebirth -q

      - name: Rebirth content pipeline
        run: python tools/rebirth_content_validate.py

      - name: Rebirth E2E navigation/auth
        run: pytest -q -m e2e tests/rebirth/e2e/test_navigation_and_auth.py

      - name: Rebirth visual screenshots
        run: python tools/qa/qa_rebirth_visual_screenshots.py --output-dir /tmp/rebirth-closed-beta-qa

      - name: Balance report 200
        run: python tools/rebirth_balance_report.py --matches 200 --output /tmp/rebirth-balance-report.md

      - name: Phase report audit
        run: python tools/ops/rebirth_phase_report_audit.py

      - name: Release readiness snapshot
        env:
          GH_TOKEN: ${{ github.token }}
          REBIRTH_GITHUB_QA_BRANCH: ${{ github.ref_name }}
          REBIRTH_GITHUB_QA_HEAD_SHA: ${{ github.sha }}
        run: |
          python tools/ops/rebirth_release_readiness.py \
            --report-only \
            --since 2026-06-01T00:00:00+00:00 \
            --release-version "${GITHUB_SHA}"
