<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ambitionz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #070711;
      color: #efe7ff;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
    }

    main {
      max-width: 420px;
      padding: 32px;
      text-align: center;
    }

    .logo {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #8e44ad, #3b1c52);
      font-size: 38px;
      font-weight: 900;
      box-shadow: 0 22px 70px rgba(142, 68, 173, .35);
    }

    a {
      color: #efe7ff;
      display: inline-block;
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 14px;
      background: #8e44ad;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">A</div>
    <h1>Ambitionz</h1>
    <p>Loading official Ambitionz beta...</p>
    <a href="https://ambitionzgame.com">Open Ambitionz</a>
  </main>

  <script>
    window.location.replace("https://ambitionzgame.com");
  </script>
</body>
</html>
