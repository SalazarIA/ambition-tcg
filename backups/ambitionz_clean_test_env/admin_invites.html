<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beta Invites - Ambition TCG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="wide-page mobile-wide-page">
        <header class="top-bar mobile-top-bar">
            <div>
                <h1>Beta Invites</h1>
                <p>Create and track invite codes</p>
            </div>
            <a href="{{ url_for('admin') }}" class="btn btn-secondary small-btn">Back</a>
        </header>

        <section class="deck-status">
            <h2>Create Invite</h2>
            <form method="POST" class="form mobile-form">
                <input type="text" name="code" placeholder="Code optional">
                <input type="number" name="max_uses" placeholder="Max uses" value="1" min="1">
                <button class="btn full-btn">Create Invite</button>
            </form>
        </section>

        <section class="deck-status">
            <h2>Invites</h2>
            <div class="deck-list">
                {% for invite in invites %}
                    <div class="deck-line">
                        <span>{{ invite.code }}</span>
                        <strong>{{ invite.used_count }}/{{ invite.max_uses }} — {{ "active" if invite.is_active else "inactive" }}</strong>
                    </div>
                {% else %}
                    <p class="subtitle">No invites yet.</p>
                {% endfor %}
            </div>
        </section>
    </main>
</body>
</html>
