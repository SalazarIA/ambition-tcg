<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback - Ambitionz</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Ambition">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <meta name="theme-color" content="#8e44ad">

    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page app-shell">
        <section class="panel form-panel mobile-panel">
            <div class="app-logo">A</div>

            <h1>Feedback</h1>
            <p class="subtitle">Report bugs, balance issues or suggestions.</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="form mobile-form">
                <select name="category" required>
                    <option value="bug">Bug</option>
                    <option value="balance">Balance</option>
                    <option value="visual">Visual / UX</option>
                    <option value="account">Account</option>
                    <option value="suggestion">Suggestion</option>
                    <option value="other">Other</option>
                </select>

                <select name="severity" required>
                    <option value="normal">Normal</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                </select>

                <input type="text" name="title" placeholder="Short title" maxlength="160" required>

                <textarea name="message" placeholder="Describe what happened..." rows="7" required></textarea>

                <input type="text" name="page_url" placeholder="Page URL, optional">

                <button type="submit" class="btn full-btn">Send Feedback</button>
            </form>

            <a href="{{ url_for('index') }}" class="text-link">Back home</a>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
</body>
</html>
