services:
  - type: web
    name: ambition-tcg
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask --app app db upgrade
    startCommand: gunicorn -w 1 --threads 100 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: DEBUG_MODE
        value: false
      - key: PUBLIC_BASE_URL
        value: https://ambition-tcg.onrender.com
      - key: SOCKETIO_CORS_ALLOWED_ORIGINS
        value: https://ambition-tcg.onrender.com
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: WTF_CSRF_ENABLED
        value: true
      - key: LOGIN_ATTEMPT_LIMIT
        value: 8
      - key: LOGIN_ATTEMPT_WINDOW_MINUTES
        value: 15
      - key: PASSWORD_RESET_RATE_LIMIT
        value: 5
      - key: PASSWORD_RESET_RATE_WINDOW_MINUTES
        value: 60
      - key: BETA_EVENT_RATE_LIMIT
        value: 60
      - key: BETA_EVENT_RATE_WINDOW_SECONDS
        value: 60
      - key: PASSWORD_MIN_LENGTH
        value: 10
      - key: PASSWORD_REQUIRE_COMPLEXITY
        value: true
      - key: MATCHMAKING_BOT_FALLBACK_SECONDS
        value: 10
      - key: BETA_AUTO_VERIFY
        value: true
      - key: EMAIL_LOG_BODY_ENABLED
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ambition-tcg-db
          property: connectionString
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: true
      - key: MAIL_FROM
        sync: false

databases:
  - name: ambition-tcg-db
    plan: starter
