services:
  - type: web
    name: ambition-tcg
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --threads 100 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: DEBUG_MODE
        value: false
      - key: PUBLIC_BASE_URL
        value: https://ambition-tcg.onrender.com
      - key: SOCKETIO_CORS_ALLOWED_ORIGINS
        value: https://ambition-tcg.onrender.com
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: WTF_CSRF_ENABLED
        value: true
      - key: EMAIL_LOG_BODY_ENABLED
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ambition-tcg-db
          property: connectionString
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: true
      - key: MAIL_FROM
        sync: false

databases:
  - name: ambition-tcg-db
    plan: starter
