[pytest]
testpaths =
    tests/rebirth
python_files =
    test_*.py
# Default run: rápido. E2E fica fora; Postgres testcontainer é auto-skip
# quando Docker/testcontainers não estão disponíveis localmente.
# Para rodar tudo incluindo E2E: `pytest -m ""` ; para só E2E: `pytest -m e2e`.
addopts = -m "not e2e"
markers =
    e2e: requires Playwright + a live dev server (slow, opt-in)
    requires_postgres: needs a real Postgres instance (testcontainers); validates SERIALIZABLE
    catalog: parametrized over the full 100-card catalog
# strict mode: only tests explicitly marked with @pytest.mark.asyncio (or
# pytestmark = pytest.mark.asyncio) are managed by pytest-asyncio. The
# pre-existing rebirth tests call asyncio.run() manually from sync tests;
# `auto` mode breaks them by reinterpreting their async helpers.
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
