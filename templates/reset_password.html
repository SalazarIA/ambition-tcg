<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Password - Ambition TCG</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8e44ad">

    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page app-shell">
        <section class="panel form-panel mobile-panel">
            <div class="app-logo">A</div>

            <h1>New Password</h1>
            <p class="subtitle">Choose a new password.</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="form mobile-form">
                <input type="password" name="password" placeholder="New password" autocomplete="new-password" required>
                <input type="password" name="password_confirm" placeholder="Confirm password" autocomplete="new-password" required>
                <button type="submit" class="btn full-btn">Change Password</button>
            </form>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
</body>
</html>
