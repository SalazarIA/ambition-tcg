<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ambitionz Rebirth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050608">
    <meta name="description" content="Ambitionz Rebirth is a fast one-card monster duel. Combine duplicates, evolve monsters and win the clash.">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/rebirth.css') }}?v=rebirth-mvp">
</head>
<body class="rb-page rb-home-page">
    <main class="rb-home-shell">
        <header class="rb-home-nav" aria-label="Ambitionz Rebirth">
            <a class="rb-brand" href="{{ url_for('index') }}" aria-label="Ambitionz home">
                <span>A</span>
                <strong>Ambitionz</strong>
            </a>
            <a class="rb-small-link" href="{{ url_for('rebirth') }}">Play</a>
        </header>

        <section class="rb-home-hero" aria-label="Ambitionz Rebirth prototype">
            <div class="rb-home-copy">
                <h1>Ambitionz Rebirth</h1>
                <p class="rb-home-line">One card. One decision. One clash.</p>
                <p>Combine duplicates. Evolve monsters. Win the duel.</p>
                <a class="rb-cta rb-cta-wide" href="{{ url_for('rebirth') }}">Play Rebirth Prototype</a>
            </div>

            <div class="rb-home-preview" aria-hidden="true">
                <div class="rb-score-frame">
                    <div>
                        <span>You</span>
                        <strong>3 HP</strong>
                    </div>
                    <div>
                        <span>Turn</span>
                        <strong>01</strong>
                    </div>
                    <div>
                        <span>Bot</span>
                        <strong>3 HP</strong>
                    </div>
                </div>
                <article class="rb-card rb-card-large rb-element-fire">
                    <div class="rb-card-art">
                        <span>Ember</span>
                    </div>
                    <div class="rb-card-body">
                        <span>Tier 2</span>
                        <strong>Ember Fang</strong>
                        <p>The cub learns to bite in flames.</p>
                    </div>
                    <b class="rb-power">5</b>
                </article>
                <div class="rb-home-hand">
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>5</span>
                    <span>6</span>
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/pwa.js') }}?v=rebirth-mvp"></script>
</body>
</html>
