<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Feedback - Ambition TCG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="wide-page mobile-wide-page">
        <header class="top-bar mobile-top-bar">
            <div>
                <h1>Feedback Ops</h1>
                <p>Bug reports and suggestions</p>
            </div>
            <a href="{{ url_for('admin') }}" class="btn btn-secondary small-btn">Back</a>
        </header>

        <section class="deck-status">
            <div class="deck-list">
                {% for report in reports %}
                    <div class="feedback-admin-card">
                        <strong>{{ report.title }}</strong>
                        <span>{{ report.category }} / {{ report.severity }} / {{ report.status }}</span>
                        <p>{{ report.message }}</p>
                        <small>{{ report.username }} — {{ report.created_at }}</small>

                        <form method="POST" action="{{ url_for('admin_feedback_update', report_id=report.id) }}">
                            <select name="status">
                                <option value="open" {% if report.status == "open" %}selected{% endif %}>open</option>
                                <option value="reviewing" {% if report.status == "reviewing" %}selected{% endif %}>reviewing</option>
                                <option value="planned" {% if report.status == "planned" %}selected{% endif %}>planned</option>
                                <option value="fixed" {% if report.status == "fixed" %}selected{% endif %}>fixed</option>
                                <option value="closed" {% if report.status == "closed" %}selected{% endif %}>closed</option>
                                <option value="rejected" {% if report.status == "rejected" %}selected{% endif %}>rejected</option>
                            </select>
                            <button class="btn btn-secondary small-btn">Update</button>
                        </form>
                    </div>
                {% else %}
                    <p class="subtitle">No feedback yet.</p>
                {% endfor %}
            </div>
        </section>
    </main>
</body>
</html>
