<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Ambitionz</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8e44ad">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Ambition">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page app-shell">
        <section class="panel form-panel mobile-panel">
            <div class="app-logo">A</div>

            <h1>Login</h1>
            <p class="subtitle">Enter the arena</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="form mobile-form">
                <input type="email" name="email" placeholder="Email" autocomplete="email" required>
                <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>

                <button type="submit" class="btn full-btn">Login</button>
            </form>

            <a href="{{ url_for('resend_verification') }}" class="text-link">Resend verification email</a>
            <a href="{{ url_for('register') }}" class="text-link">Create account</a>
            <br>
            <a href="{{ url_for('forgot_password') }}" class="text-link">Forgot password?</a>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
</body>
</html>
