<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Ambitionz</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Ambition">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <meta name="theme-color" content="#8e44ad">

    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page app-shell">
        <section class="panel form-panel mobile-panel">
            <div class="app-logo">A</div>

            <h1>Reset Password</h1>
            <p class="subtitle">Enter your account email.</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="form mobile-form">
                <input type="email" name="email" placeholder="Email" autocomplete="email" required>
                <button type="submit" class="btn full-btn">Send Reset Link</button>
            </form>

            <a href="{{ url_for('login') }}" class="text-link">Back to login</a>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
</body>
</html>
