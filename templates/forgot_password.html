<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Ambitionz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Ambitionz">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page app-shell">
        <section class="panel form-panel mobile-panel">
            <div class="app-logo">A</div>
            <h1>Forgot Password</h1>
            <p class="subtitle">Enter your email to receive a reset link.</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="form mobile-form">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <input type="email" name="email" placeholder="Email" required>
                <button type="submit" class="btn full-btn">Send Reset Link</button>
            </form>

            <a href="{{ url_for('login') }}" class="text-link">Back to Login</a>
        </section>
    </main>
</body>
</html>
