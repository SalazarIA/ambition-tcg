<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ranking - Ambitionz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="wide-page mobile-wide-page">
        <header class="top-bar mobile-top-bar">
            <div>
                <h1>Ranking</h1>
                <p>Top Ambitionz players</p>
            </div>

            <a href="{{ url_for('index') }}" class="btn btn-secondary small-btn">Back</a>
        </header>

        <section class="deck-status">
            <h2>Leaderboard</h2>

            <div class="deck-list">
                {% for player in users %}
                    <div class="deck-line">
                        <span>#{{ loop.index }} — {{ player.username }}</span>
                        <strong>W {{ player.wins }} / L {{ player.losses }} / Lv {{ player.level }}</strong>
                    </div>
                {% else %}
                    <p class="subtitle">No ranked players yet.</p>
                {% endfor %}
            </div>
        </section>
    </main>
</body>
</html>
