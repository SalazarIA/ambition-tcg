<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Match History - Ambitionz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="wide-page mobile-wide-page">
        <header class="top-bar mobile-top-bar">
            <div>
                <h1>Match History</h1>
                <p>Recent Ambitionz battles</p>
            </div>

            <a href="{{ url_for('index') }}" class="btn btn-secondary small-btn">Back</a>
        </header>

        <section class="deck-status">
            <h2>Recent Matches</h2>

            <div class="deck-list">
                {% for match in matches %}
                    <div class="deck-line">
                        <span>Match #{{ match.id }}</span>
                        <strong>{{ match.created_at if match.created_at is defined else "Recorded" }}</strong>
                    </div>
                {% else %}
                    <p class="subtitle">No matches recorded yet.</p>
                {% endfor %}
            </div>
        </section>
    </main>
</body>
</html>
